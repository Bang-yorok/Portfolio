<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nguyen Bang | Viktor Oddy</title>
    <meta
      name="description"
      content="A bilingual creative profile landing page for Nguyen Bang, presented with the Viktor Oddy studio aesthetic."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isLocal =
        location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const script = document.createElement('script');
      script.type = 'module';

      if (isLocal) {
        script.src = '/src/main.tsx';
      } else {
        const css = document.createElement('link');
        css.rel = 'stylesheet';
        css.href = '/Portfolio/assets/main.css';
        document.head.appendChild(css);

        script.src = '/Portfolio/assets/main.js';
      }

      document.body.appendChild(script);
    </script>
  </body>
  </html>
